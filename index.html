<title>Fono — learn to read with a monster</title>
<style>
  :root {
    --night: #241B4E;      /* deep indigo sky */
    --night-2: #362A73;    /* lighter indigo */
    --cream: #FFF6E6;      /* warm paper */
    --coral: #FF6B5E;      /* primary action */
    --teal: #2DBFA8;       /* correct / go */
    --gold: #FFC93C;       /* stars / reward */
    --grape: #7C6BFF;      /* accent */
    --ink: #2B2440;        /* text on cream */
    --wrong: #E8615A;
    --shadow: rgba(15, 10, 40, 0.28);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--night);
    background-image: radial-gradient(circle at 20% 15%, #3A2C7E 0%, transparent 40%),
                      radial-gradient(circle at 85% 25%, #4A2C6E 0%, transparent 45%),
                      radial-gradient(circle at 50% 100%, #2A2060 0%, transparent 60%);
    color: var(--cream);
    font-family: "Baloo 2", "Quicksand", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 18px; line-height: 1.4; overflow-x: hidden;
  }
  /* twinkle star field */
  #stars-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; min-height: 100%; padding: 20px 18px 40px; }

  .display { font-weight: 800; letter-spacing: -0.01em; line-height: 1.05; }
  h1.display { font-size: clamp(30px, 7vw, 44px); }
  h2.display { font-size: clamp(22px, 5vw, 30px); }
  .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
  .muted { color: #C9C1E8; }

  /* buttons */
  .btn {
    font: inherit; font-weight: 800; border: 0; cursor: pointer; color: #fff;
    background: var(--coral); border-radius: 18px; padding: 15px 26px; font-size: 19px;
    box-shadow: 0 5px 0 #D8493D, 0 8px 18px var(--shadow); transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #D8493D, 0 3px 10px var(--shadow); }
  .btn.block { display: block; width: 100%; }
  .btn.teal { background: var(--teal); box-shadow: 0 5px 0 #1E9B88, 0 8px 18px var(--shadow); }
  .btn.grape { background: var(--grape); box-shadow: 0 5px 0 #5B4CD6, 0 8px 18px var(--shadow); }
  .btn.gold { background: var(--gold); color: #5A3E00; box-shadow: 0 5px 0 #D9A81F, 0 8px 18px var(--shadow); }
  .btn.ghost { background: rgba(255,255,255,0.12); box-shadow: none; border: 2px solid rgba(255,255,255,0.35); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }
  .btn.small { padding: 9px 16px; font-size: 15px; border-radius: 13px; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }

  .card {
    background: var(--cream); color: var(--ink); border-radius: 24px; padding: 22px;
    box-shadow: 0 10px 30px var(--shadow); margin-bottom: 16px;
  }
  .center { text-align: center; }
  .mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mt32{margin-top:32px}
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

  /* star counter */
  .starbar { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.25);
    border-radius: 999px; padding: 8px 16px; font-weight: 800; font-size: 20px; }
  .starbar svg { width: 24px; height: 24px; }

  /* top bar */
  #topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .backbtn { font: inherit; font-weight: 800; font-size: 16px; background: rgba(255,255,255,0.12);
    color: #fff; border: 0; border-radius: 14px; padding: 10px 16px; cursor: pointer; }

  /* option grid (games) */
  .opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 20px; }
  .opt {
    font: inherit; cursor: pointer; border: 0; background: var(--cream); color: var(--ink);
    border-radius: 20px; padding: 28px 10px; font-size: 40px; font-weight: 800;
    box-shadow: 0 6px 0 #E4D8BC, 0 8px 18px var(--shadow); transition: transform .08s, box-shadow .08s;
    text-transform: lowercase; min-height: 96px;
  }
  .opt:active { transform: translateY(4px); box-shadow: 0 2px 0 #E4D8BC; }
  .opt.correct { background: var(--teal); color: #fff; box-shadow: 0 6px 0 #1E9B88; animation: pop .3s; }
  .opt.wrong { background: var(--wrong); color: #fff; box-shadow: 0 6px 0 #B93E38; animation: shake .3s; }
  .opt.dim { opacity: 0.4; }
  @keyframes pop { 0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)} }

  /* segment tiles */
  .tiles { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 22px; }
  .tile { font: inherit; cursor: pointer; border: 0; background: var(--grape); color: #fff;
    border-radius: 16px; padding: 18px 22px; font-size: 32px; font-weight: 800; text-transform: lowercase;
    box-shadow: 0 5px 0 #5B4CD6; transition: transform .08s; min-width: 64px; }
  .tile:active { transform: translateY(3px); }
  .tile.used { opacity: 0.3; pointer-events: none; }
  .slots { display: flex; gap: 10px; justify-content: center; margin-top: 20px; min-height: 74px; }
  .slot { width: 64px; height: 68px; border-radius: 16px; border: 3px dashed rgba(43,36,64,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800;
    color: var(--ink); text-transform: lowercase; background: rgba(255,255,255,0.5); }
  .slot.filled { border-style: solid; border-color: var(--teal); background: #fff; }

  /* progress dots */
  .pdots { display: flex; gap: 8px; justify-content: center; margin-top: 4px; }
  .pdots i { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.25); }
  .pdots i.on { background: var(--gold); }
  .pdots i.miss { background: var(--wrong); }

  /* stage map */
  .map-path { position: relative; margin-top: 8px; }
  .node { display: flex; align-items: center; gap: 16px; margin: 14px 0; }
  .node .bubble { width: 62px; height: 62px; min-width: 62px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-weight: 800; font-size: 24px; color: #fff;
    background: var(--grape); box-shadow: 0 5px 0 rgba(0,0,0,0.25); }
  .node.locked .bubble { background: #4C4470; color: #8B82AE; }
  .node.done .bubble { background: var(--teal); box-shadow: 0 5px 0 #1E9B88; }
  .node.current .bubble { background: var(--coral); box-shadow: 0 5px 0 #D8493D; animation: bob 1.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }
  .node .label { font-weight: 700; }
  .node .label small { display: block; font-weight: 600; font-size: 13px; }
  .node.locked .label { color: #8B82AE; }

  /* prompt speaker */
  .speaker { display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    background: var(--gold); color: #5A3E00; border: 0; cursor: pointer; font: inherit; font-weight: 800;
    border-radius: 22px; padding: 20px 30px; font-size: 22px; box-shadow: 0 6px 0 #D9A81F, 0 8px 18px var(--shadow); }
  .speaker:active { transform: translateY(4px); box-shadow: 0 2px 0 #D9A81F; }
  .speaker svg { width: 30px; height: 30px; }
  .word-show { font-size: 56px; font-weight: 800; letter-spacing: 2px; text-transform: lowercase; }

  /* shop grid */
  .shopgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
  .shopitem { background: var(--cream); color: var(--ink); border-radius: 18px; padding: 14px 8px; text-align: center;
    box-shadow: 0 5px 0 #E4D8BC; cursor: pointer; border: 3px solid transparent; }
  .shopitem.equipped { border-color: var(--teal); }
  .shopitem.locked { opacity: 0.65; }
  .swatch { width: 46px; height: 46px; border-radius: 50%; margin: 0 auto 6px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15); }
  .shopitem .name { font-weight: 700; font-size: 13px; }
  .shopitem .cost { font-weight: 800; font-size: 13px; color: #9A7B00; display: inline-flex; align-items: center; gap: 3px; }

  /* word maze */
  .maze { display: grid; gap: 8px; max-width: 340px; margin: 16px auto 0; }
  .mcell { font: inherit; font-weight: 800; font-size: 26px; text-transform: lowercase; cursor: pointer;
    aspect-ratio: 1; border: 0; border-radius: 14px; background: var(--cream); color: var(--ink);
    box-shadow: 0 4px 0 #E4D8BC; transition: transform .08s, background .15s; }
  .mcell:active { transform: translateY(3px); }
  .mcell.start { background: var(--gold); color: #5A3E00; box-shadow: 0 4px 0 #D9A81F; animation: bob 1.4s ease-in-out infinite; }
  .mcell.here { background: var(--coral); color: #fff; box-shadow: 0 4px 0 #D8493D; animation: bob 1.2s ease-in-out infinite; }
  .mcell.walked { background: var(--teal); color: #fff; box-shadow: 0 4px 0 #1E9B88; }
  .mcell.goal { background: var(--teal); color: #fff; box-shadow: 0 4px 0 #1E9B88; }
  .mcell.bad { background: var(--wrong); color: #fff; animation: shake .3s; }
  .mazetrack { display: flex; gap: 8px; justify-content: center; }
  .mstep { display: inline-flex; align-items: center; justify-content: center; min-width: 40px; height: 44px;
    border-radius: 12px; background: rgba(255,255,255,0.12); font-weight: 800; font-size: 22px; text-transform: lowercase; }
  .mstep.on { background: var(--teal); color: #fff; }

  .toast { position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(80px);    background: var(--ink); color: #fff; padding: 14px 22px; border-radius: 16px; font-weight: 700;
    box-shadow: 0 10px 30px var(--shadow); z-index: 90; opacity: 0; transition: transform .3s, opacity .3s; text-align: center; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .field { font: inherit; font-weight: 700; font-size: 20px; padding: 14px 18px; border-radius: 16px;
    border: 3px solid #E4D8BC; width: 100%; background: #fff; color: var(--ink); text-align: center; }

  input:focus-visible, button:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .btn, .opt, .tile { transition: none; } }
  @media (max-width: 400px) { .opt { font-size: 32px; padding: 22px 8px; } .shopgrid { grid-template-columns: repeat(2, 1fr); } }
</style>

// FONO core: curriculum data + pure game logic. No DOM. Runs in browser and Node.

// ---------- Storage (localStorage with in-memory fallback) ----------
function makeStore(backing) {
  let mem = {};
  let ls = null;
  try {
    if (backing) { backing.setItem('__t', '1'); backing.removeItem('__t'); ls = backing; }
  } catch (e) { ls = null; }
  return {
    persistent: !!ls,
    get(key, fallback) {
      try {
        const raw = ls ? ls.getItem(key) : (key in mem ? mem[key] : null);
        return raw == null ? fallback : JSON.parse(raw);
      } catch (e) { return fallback; }
    },
    set(key, value) {
      const raw = JSON.stringify(value);
      if (ls) { try { ls.setItem(key, raw); } catch (e) { mem[key] = raw; } }
      else mem[key] = raw;
    },
    del(key) { if (ls) { try { ls.removeItem(key); } catch (e) {} } delete mem[key]; }
  };
}

function levelsForStage(stageId) {

    2: ['wordbuild', 'segment', 'maze', 'wordbuild', 'soundmatch', 'segment', 'wordbuild', 'tricky'],

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rnd) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor((rnd ? rnd() : Math.random()) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n, rnd) { return shuffle(arr, rnd).slice(0, n); }

function weightFor(stats, key) {
  const s = stats[key];
  if (!s || (s.right + s.wrong) === 0) return 2;
  const acc = s.right / (s.right + s.wrong);
  return acc < 0.5 ? 5 : acc < 0.8 ? 3 : 1;
}
function weightedPick(keys, stats, rnd) {
  const weights = keys.map(k => weightFor(stats, k));
  let total = weights.reduce((a, b) => a + b, 0);
  let r = (rnd ? rnd() : Math.random()) * total;
  for (let i = 0; i < keys.length; i++) { r -= weights[i]; if (r <= 0) return keys[i]; }
  return keys[keys.length - 1];
}

function genSoundMatch(stageGraphemes, stats, rnd) {
  const answer = weightedPick(stageGraphemes, stats, rnd);
  const distractors = sample(stageGraphemes.filter(g => g !== answer), 3, rnd);
  const options = shuffle([answer].concat(distractors), rnd);
  return { kind: 'soundmatch', answer, options, prompt: answer };
}
function genWordBuild(pool, stats, rnd) {
  const word = pool[Math.floor((rnd ? rnd() : Math.random()) * pool.length)];
  const sameLen = pool.filter(x => x.w !== word.w && x.parts.length === word.parts.length);
  const distractors = sample(sameLen.length >= 3 ? sameLen : pool.filter(x => x.w !== word.w), 3, rnd).map(x => x.w);
  const options = shuffle([word.w].concat(distractors), rnd);
  return { kind: 'wordbuild', answer: word.w, options, prompt: word.w, parts: word.parts };
}
function genSegment(pool, stats, rnd) {
  const word = pool[Math.floor((rnd ? rnd() : Math.random()) * pool.length)];
  const extra = sample(GRAPHEMES.map(x => x.g).filter(g => word.parts.indexOf(g) === -1), 2, rnd);
  const tiles = shuffle(word.parts.concat(extra), rnd);
  return { kind: 'segment', answer: word.parts.slice(), word: word.w, tiles, prompt: word.w };
}
function genTricky(trickyList, rnd) {
  const word = trickyList[Math.floor((rnd ? rnd() : Math.random()) * trickyList.length)];
  const distractors = sample(TRICKY.filter(t => t !== word), 3, rnd);
  const options = shuffle([word].concat(distractors), rnd);
  return { kind: 'tricky', answer: word, options, prompt: word };
}

// WORD MAZE: navigate a grid, stepping onto the correct next grapheme of the target word.
// Builds a guaranteed solvable path, then fills remaining cells with distractor graphemes.
function genMaze(pool, stageGraphemes, rnd, opts) {
  opts = opts || {};
  const rows = opts.rows || 4, cols = opts.cols || 4;
  const R = rnd || Math.random;
  // pick a word whose length fits the path (2..min(rows*cols-1, 5) sounds)
  const maxLen = Math.min(5, rows * cols - 1);
  const candidates = pool.filter(x => x.parts.length >= 2 && x.parts.length <= maxLen);
  const word = (candidates.length ? candidates : pool)[Math.floor(R() * (candidates.length ? candidates.length : pool.length))];
  const parts = word.parts;

  // grid of cells; each cell { g } ; carve a self-avoiding path of length parts.length
  const idx = (r, c) => r * cols + c;
  const inb = (r, c) => r >= 0 && r < rows && c >= 0 && c < cols;
  const neighbors = (r, c) => [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([a,b]) => inb(a,b));

  let path = null;
  for (let attempt = 0; attempt < 60 && !path; attempt++) {
    // random start on an edge for a nicer feel
    const start = [Math.floor(R() * rows), Math.floor(R() * cols)];
    const visited = {}; const p = [start]; visited[idx(start[0], start[1])] = true;
    let ok = true;
    for (let step = 1; step < parts.length; step++) {
      const [r, c] = p[p.length - 1];
      const opts2 = neighbors(r, c).filter(([a, b]) => !visited[idx(a, b)]);
      if (!opts2.length) { ok = false; break; }
      const nx = opts2[Math.floor(R() * opts2.length)];
      p.push(nx); visited[idx(nx[0], nx[1])] = true;
    }
    if (ok && p.length === parts.length) path = p;
  }
  // fallback: straight line across the top
  if (!path) {
    path = [];
    for (let i = 0; i < parts.length; i++) path.push([Math.floor(i / cols), i % cols]);
  }

  // assign graphemes: path cells get the word's parts in order; others get distractors
  const cells = new Array(rows * cols).fill(null);
  path.forEach(([r, c], i) => { cells[idx(r, c)] = { g: parts[i], path: i }; });

  // For each path cell i (except last), its "next needed" grapheme is parts[i+1].
  // A distractor placed on any neighbor of path-cell-i must NOT equal parts[i+1],
  // otherwise the child could step onto the wrong cell and still "match".
  // Build, per empty cell, the set of forbidden graphemes.
  const forbidden = {}; // cellIndex -> Set of graphemes
  path.forEach(([r, c], i) => {
    if (i + 1 >= parts.length) return;
    neighbors(r, c).forEach(([a, b]) => {
      const ci = idx(a, b);
      if (cells[ci]) return; // occupied by path already
      (forbidden[ci] || (forbidden[ci] = new Set())).add(parts[i + 1]);
    });
  });

  const distractorPool = stageGraphemes.slice();
  for (let i = 0; i < cells.length; i++) {
    if (cells[i]) continue;
    const banned = forbidden[i] || new Set();
    let choices = distractorPool.filter(g => !banned.has(g));
    if (!choices.length) choices = distractorPool; // extreme fallback
    const g = choices[Math.floor(R() * choices.length)];
    cells[i] = { g: g, path: -1 };
  }

  return {
    kind: 'maze', word: word.w, parts: parts.slice(), rows, cols,
    cells: cells.map(c => c.g), pathCells: path.map(([r, c]) => idx(r, c)),
    start: path[0][0] * cols + path[0][1], prompt: word.w
  };
}

function genQuestion(level, stage, stats, rnd) {
  const wordPool = WORDS.filter(x => x.parts.every(p => stage.graphemes.indexOf(p) !== -1));
  switch (level.type) {
    case 'soundmatch': return genSoundMatch(stage.graphemes, stats, rnd);
    case 'wordbuild':  return genWordBuild(wordPool, stats, rnd);
    case 'segment':    return genSegment(wordPool, stats, rnd);
    case 'tricky':     return genTricky(stage.tricky, rnd);
    case 'maze':       return genMaze(wordPool, stage.graphemes, rnd);
  }
}

function checkAnswer(q, response) {
  if (q.kind === 'segment') {
    return Array.isArray(response) && response.length === q.answer.length &&
      response.every((r, i) => r === q.answer[i]);
  }
  if (q.kind === 'maze') {
    // response is the sequence of grapheme cells stepped on; must equal the word parts in order
    return Array.isArray(response) && response.length === q.parts.length &&
      response.every((r, i) => r === q.parts[i]);
  }
  return response === q.answer;
}
function recordResult(stats, q, correct) {
  const keys = q.kind === 'soundmatch' ? [q.answer]
    : q.kind === 'segment' ? q.answer
    : q.kind === 'wordbuild' ? (q.parts || [])
    : q.kind === 'maze' ? (q.parts || [])
    : [];
  keys.forEach(k => {
    if (!stats[k]) stats[k] = { right: 0, wrong: 0 };
    stats[k][correct ? 'right' : 'wrong']++;
  });
  return stats;
}

function newProgress() {
  return { stage: 1, level: 0, stars: 0, stats: {}, trickyStats: {},
    completed: {}, owned: ['c-coral'], equipped: { color: 'c-coral', hat: null } };
}
function levelKey(stage, level) { return stage + ':' + level; }
function advance(progress) {
  const levels = levelsForStage(progress.stage);
  progress.completed[levelKey(progress.stage, progress.level)] = true;
  if (progress.level + 1 < levels.length) {
    progress.level++;
    return { stage: progress.stage, level: progress.level, finishedGame: false, finishedAll: false };
  }
  if (progress.stage < STAGES.length) {
    progress.stage++; progress.level = 0;
    return { stage: progress.stage, level: 0, finishedGame: true, finishedAll: false };
  }
  return { stage: progress.stage, level: progress.level, finishedGame: true, finishedAll: true };
}
function isLevelUnlocked(progress, stage, level) {
  if (stage < progress.stage) return true;
  if (stage === progress.stage) return level <= progress.level;
  return false;
}

      sess.picks.push({ idx: Number(t.dataset.tile), g: t.dataset.g });
      speakGrapheme(t.dataset.g);
      refresh();
      if (sess.picks.length === q.answer.length) setTimeout(checkSegment, 450);
    }));
    $('#undo').addEventListener('click', () => { if (!sess.answered) { sess.picks.pop(); refresh(); } });
  }

  function checkSegment() {
    const q = sess.q;
    const response = sess.picks.map(p => p.g);
    const correct = checkAnswer(q, response);
    sess.answered = true;
    recordResult(progress.stats, q, correct);
    const slots = app.querySelectorAll('.slot');
    slots.forEach(s => s.style.borderColor = correct ? 'var(--teal)' : 'var(--wrong)');
    if (correct) { celebrate(); soundOut(q.answer, () => speakWord(q.word)); }
    else { setTimeout(() => soundOut(q.answer, () => speakWord(q.word)), 300); }
    finishQuestion(correct);
  }

  function bindMaze(q) {
    sess.step = 0;                 // how many correct cells stepped on (start counts as step 0)
    sess.mazePath = [q.start];     // cell indices visited
    const grid = $('#maze'), track = $('#mtrack');
    const rc = i => [Math.floor(i / q.cols), i % q.cols];
    const isNeighbor = (a, b) => {
      const [ar, ac] = rc(a), [br, bc] = rc(b);
      return Math.abs(ar - br) + Math.abs(ac - bc) === 1;
    };
    const refresh = () => {
      grid.querySelectorAll('.mcell').forEach(c => {
        const i = Number(c.dataset.cell);
        const onPath = sess.mazePath.indexOf(i) !== -1;
        const isHere = i === sess.mazePath[sess.mazePath.length - 1];
        c.classList.toggle('walked', onPath && !isHere);
        c.classList.toggle('here', isHere);
      });
      track.innerHTML = q.parts.map((p, i) =>
        '<span class="mstep' + (i < sess.step + 1 ? ' on' : '') + '">' + esc(i < sess.step + 1 ? p : '·') + '</span>').join('');
    };
    refresh();
    grid.querySelectorAll('.mcell').forEach(c => c.addEventListener('click', () => {
      if (sess.answered) return;
      const i = Number(c.dataset.cell);
      const cur = sess.mazePath[sess.mazePath.length - 1];
      if (i === cur) return;
      const nextNeeded = q.parts[sess.step + 1];
      const intended = q.pathCells[sess.step + 1];
      // must be an adjacent cell showing the next needed sound (use intended index to avoid ambiguity)
      if (isNeighbor(cur, i) && i === intended && q.cells[i] === nextNeeded) {
        sess.step++;
        sess.mazePath.push(i);
        speakGrapheme(nextNeeded);
        refresh();
        if (sess.step === q.parts.length - 1) setTimeout(() => finishMaze(true), 450);
      } else {
        // wrong step: flash red, count as a miss for the whole question
        c.classList.add('bad');
        speak(q.cells[i], 0.8);
        setTimeout(() => c.classList.remove('bad'), 400);
        finishMaze(false);
      }
    }));
    $('#undo').addEventListener('click', () => {
      if (sess.answered || sess.mazePath.length <= 1) return;
      sess.mazePath.pop(); sess.step = Math.max(0, sess.step - 1); refresh();
    });
  }

  function finishMaze(correct) {
    if (sess.answered) return;
    const q = sess.q;
    sess.answered = true;
    recordResult(progress.stats, q, correct);
    const grid = $('#maze');
    if (correct) {
      celebrate();
      grid.querySelectorAll('.mcell').forEach(c => {
        if (q.pathCells.indexOf(Number(c.dataset.cell)) !== -1) c.classList.add('goal');
      });
      soundOut(q.parts, () => speakWord(q.word));
      const hint = $('#mazehint'); if (hint) hint.textContent = 'You walked ' + q.word + '!';
    } else {
      const hint = $('#mazehint'); if (hint) { hint.textContent = 'The path was: ' + q.parts.join(' – '); }
      // reveal correct path faintly
      grid.querySelectorAll('.mcell').forEach(c => {
        if (q.pathCells.indexOf(Number(c.dataset.cell)) !== -1) c.classList.add('goal');
      });
      setTimeout(() => soundOut(q.parts, () => speakWord(q.word)), 300);
    }
    finishQuestion(correct);
  }

  function finishQuestion(correct) {
    sess.results[sess.qNum] = correct;
    if (correct) { sess.correct++; progress.stars += STARS_PER_CORRECT; }
    save();
    setTimeout(() => {
      sess.qNum++;
      if (sess.qNum >= QUESTIONS_PER_LEVEL) return endLevel();
      sess.q = null; sess.answered = false; sess.picks = [];
      render();
    }, correct ? 900 : 1500);
  }

  function endLevel() {
    // bonus stars for a strong round
    let bonus = 0;
    if (sess.correct === QUESTIONS_PER_LEVEL) { bonus = STAR_BONUS_LEVEL; progress.stars += bonus; }
    const wasStage = progress.stage;
    const res = advance(progress);
    save();
    celebrate();
    const perfect = sess.correct === QUESTIONS_PER_LEVEL;
    let html = topBar(false);
    html += '<div class="center mt24">' + monsterSVG(monsterOpts({ size: 150 })) + '</div>';
    html += '<div class="card center mt16">' +
      '<h2 class="display">' + (perfect ? 'Perfect!' : 'Nice work!') + '</h2>' +
      '<p class="mt8" style="font-weight:700">You got ' + sess.correct + ' of ' + QUESTIONS_PER_LEVEL + '</p>' +
      '<div class="mt16" style="font-size:26px;font-weight:800;color:#9A7B00">+' + (sess.correct * STARS_PER_CORRECT + bonus) + ' ⭐</div>' +
      (bonus ? '<div class="muted mt8">Bonus for a perfect round!</div>' : '') + '</div>';
    if (res.finishedGame && !res.finishedAll) {
      html += '<button class="btn block teal" id="next">Next stage →</button>';
    } else if (res.finishedAll) {
      html += '<div class="card center"><h2 class="display">🚀</h2><p style="font-weight:700">You finished every stage! ' + esc(monster.name) + ' can read!</p></div>' +
        '<button class="btn block" id="next">Back to the map</button>';
    } else {
      html += '<button class="btn block teal" id="next">Keep going →</button>';
    }
    html += '<button class="btn block grape mt8" id="toshop">✨ Visit the shop</button>';
    app.innerHTML = html;
    $('#next').addEventListener('click', () => go('map'));
    $('#toshop').addEventListener('click', () => go('shop'));
    if (res.finishedGame && !res.finishedAll) speak('Well done! On to stage ' + progress.stage, 0.95);
    else speak(perfect ? 'Perfect!' : 'Well done!', 1);
  }

  // ---------- shop ----------
  function renderShop() {
    let html = topBar(true);
    html += '<div class="center mt8"><h2 class="display">Monster shop</h2>' +
      '<p class="muted" style="font-size:15px">Earn stars by playing. Tap to buy or wear.</p></div>';
    html += '<div class="center mt16" id="shopmon"></div>';
    const colors = SHOP.filter(x => x.type === 'color'), hats = SHOP.filter(x => x.type === 'hat');
    const cell = it => {
      const owned = progress.owned.indexOf(it.id) !== -1;
      const equipped = progress.equipped[it.type] === it.id;
      const afford = progress.stars >= it.cost;
      const cls = 'shopitem' + (equipped ? ' equipped' : '') + (!owned && !afford ? ' locked' : '');
      const visual = it.type === 'color'
        ? '<div class="swatch" style="background:' + it.hex + '"></div>'
        : '<div style="height:46px;margin-bottom:6px">' + hatPreview(it.id) + '</div>';
      const status = equipped ? '✓ Wearing' : owned ? 'Tap to wear' : (it.cost + ' ⭐');
      return '<button class="' + cls + '" data-item="' + it.id + '">' + visual +
        '<div class="name">' + esc(it.name) + '</div><div class="cost">' + status + '</div></button>';
    };
    html += '<div class="eyebrow mt24">Colours</div><div class="shopgrid">' + colors.map(cell).join('') + '</div>';
    html += '<div class="eyebrow mt24">Hats</div><div class="shopgrid">' + hats.map(cell).join('') + '</div>';
    if (progress.equipped.hat) html += '<button class="btn block ghost mt16" id="nohat">Take hat off</button>';
    app.innerHTML = html;
    bindBack('map');
    $('#shopmon').innerHTML = monsterSVG(monsterOpts({ size: 150 }));
    app.querySelectorAll('[data-item]').forEach(b => b.addEventListener('click', () => onShopTap(b.dataset.item)));
    const nh = $('#nohat'); if (nh) nh.addEventListener('click', () => { progress.equipped.hat = null; save(); renderShop(); });
  }
  function hatPreview(id) {
    return '<svg viewBox="30 -32 100 74" width="60" height="46">' +
      (id === 'h-party' ? '<path d="M60 34 L80 -14 L100 34 Z" fill="#FF8FC7"/><circle cx="80" cy="-16" r="7" fill="#FFC93C"/>' :
       id === 'h-crown' ? '<path d="M50 30 L54 -2 L68 20 L80 -8 L92 20 L106 -2 L110 30 Z" fill="#FFC93C" stroke="#D9A81F" stroke-width="2"/>' :
       id === 'h-cap' ? '<path d="M44 34 Q80 -6 116 34 Z" fill="#2DBFA8"/><path d="M44 34 Q80 24 116 34 L128 40 Q80 32 44 40 Z" fill="#1E9B88"/>' :
       '<path d="M56 34 L80 -30 L104 34 Z" fill="#7C6BFF"/><path d="M40 34 h80 v8 h-80 Z" fill="#5B4CD6"/>') + '</svg>';
  }
  function onShopTap(id) {
    const owned = progress.owned.indexOf(id) !== -1;
    if (owned) { equip(progress, id); save(); toast('Wearing ' + SHOP_BY_ID[id].name); renderShop(); return; }
    if (canBuy(progress, id)) { buy(progress, id); equip(progress, id); save(); celebrate(); toast('Unlocked ' + SHOP_BY_ID[id].name + '!'); renderShop(); }
    else { toast('Need ' + (SHOP_BY_ID[id].cost - progress.stars) + ' more stars'); }
  }

  // ---------- starfield background ----------
  function starfield() {
    const cv = $('#stars-bg'); if (!cv || !cv.getContext) return;
    const ctx = cv.getContext('2d');
    let stars = [];
    function resize() {
      cv.width = window.innerWidth; cv.height = window.innerHeight;
      stars = []; const n = Math.min(90, Math.floor(cv.width * cv.height / 14000));
      for (let i = 0; i < n; i++) stars.push({ x: Math.random() * cv.width, y: Math.random() * cv.height, r: Math.random() * 1.6 + 0.4, p: Math.random() * Math.PI * 2, s: 0.6 + Math.random() });
    }
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function frame(t) {
      ctx.clearRect(0, 0, cv.width, cv.height);
      stars.forEach(st => {
        const tw = reduced ? 0.7 : 0.5 + 0.5 * Math.sin(t / 700 * st.s + st.p);
        ctx.globalAlpha = 0.3 + 0.7 * tw; ctx.fillStyle = '#FFF3C9';
        ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2); ctx.fill();
      });
      ctx.globalAlpha = 1;
      if (!reduced) requestAnimationFrame(frame);
    }
    resize(); window.addEventListener('resize', resize); requestAnimationFrame(frame);
  }

  // ---------- boot ----------
  try { if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = initVoices; } catch (e) {}
  initVoices(); starfield();
  window.__fono = {
    reset() { ['fono.monster', 'fono.progress'].forEach(k => store.del(k)); monster = null; progress = null; screen = 'boot'; render(); },
    probeKind() { return sess && sess.q ? sess.q.kind : null; },
    probeAnswer() { return sess && sess.q ? sess.q.answer : null; },
    probeMaze() { return sess && sess.q && sess.q.kind === 'maze' ? { parts: sess.q.parts, pathCells: sess.q.pathCells, cols: sess.q.cols, start: sess.q.start } : null; },
    probeResult() { return sess ? sess.results[sess.qNum] : null; },
    stars() { return progress ? progress.stars : 0; },
    stage() { return progress ? progress.stage : 0; }
  };
  render();
})();
// ===UI-END===
</script>
